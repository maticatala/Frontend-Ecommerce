<mat-card>
  <mat-card-header>
    <mat-card-title>Categoría</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="categoryForm" (ngSubmit)="onFormSubmit()">
      <div class="file-container">
        <input
          type="file"
          class="file"
          (change)="getFile($event)"
          formControlName="image"
        />
        <div class="img-view">
          <ng-container *ngIf="!imagen">
            <mat-icon class="icon">image</mat-icon>
            <p>Arrastra y suelta o haz clic aquí<br/>para cargar una imagen</p>
          </ng-container>
          <ng-container *ngIf="imagen">
            <img [src]="imagen" alt="" />
            <mat-icon class="close" (click)="clearFile()">close</mat-icon>
          </ng-container>
        </div>
      </div>
      <mat-hint
        customLabel
        [isTouched]="categoryForm.get('image')?.touched"
        [errors]="categoryForm.get('image')?.errors"
      ></mat-hint>

      <mat-form-field appearance="outline" class="mt-4" color="accent">
        <mat-label>Nombre de la categoría</mat-label>
        <input matInput placeholder="Nombre de la categoría..." formControlName="categoryName" />
        <mat-hint
          customLabel
          [isTouched]="categoryForm.get('categoryName')?.touched"
          [errors]="categoryForm.get('categoryName')?.errors"
        ></mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" color="accent">
        <mat-label>Descripción</mat-label>
        <textarea matInput placeholder="Descripción..." formControlName="description"></textarea>
        <mat-hint
          customLabel
          [isTouched]="categoryForm.get('description')?.touched"
          [errors]="categoryForm.get('description')?.errors"
        ></mat-hint>
      </mat-form-field>

      <button class="chiplg accent" type="submit">
        {{categoryId ? 'Actualizar Categoría' : 'Añadir Categoría'}}
      </button>
    </form>
  </mat-card-content>
</mat-card>
