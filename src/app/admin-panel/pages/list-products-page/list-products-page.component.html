<shared-table
  [dataSource]="dataSource"
  [columnsdef]="columns"
  [paginatorOff]="false"
  [length]="dataSource.data?.length || 0"
  [pageSize]="25"
  [pageSizeOptions]="[10, 25, 50, 100]"
  (elementoEditado)="onElementoEditado($event)"
  (elementoEliminado)="onElementoEliminado($event)"
  (elementoAgregado)="onAddElement($event)">
</shared-table>
